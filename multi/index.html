<!DOCTYPE html><html><head><meta charset="utf-8" />
<title>EtherCalc - Share the URL to your friends and edit together!</title>
<script src="static/multi.js"></script>
<body onload="init()"></body>
  <script src="./static/jszip.js"></script>
  <script src="./static/xlsx.core.min.js"></script>
  <script src="./static/shim.js"></script>
  <script src="./static/jquery.js"></script>
<script>
var rABS = typeof FileReader !== "undefined" && typeof FileReader.prototype !== "undefined" && typeof FileReader.prototype.readAsBinaryString !== "undefined";
// Sandstorm's CSP disables web workers. XLSX parsing already has a synchronous
// fallback below, so keep worker use configurable and disabled for this page.
var useXlsxWorker = false;
function fixdata(data) {
	var o = "", l = 0, w = 10240;
	for(; l<data.byteLength/w; ++l)
		o+=String.fromCharCode.apply(null,new Uint8Array(data.slice(l*w,l*w+w)));
	o+=String.fromCharCode.apply(null, new Uint8Array(data.slice(o.length)));
	return o;
}

function xlsxworker(data, cb) {
	var worker = new Worker('./static/xlsxworker.js');
	worker.onmessage = function(e) {
		switch(e.data.t) {
			case 'ready': break;
			case 'e': console.error(e.data.d); break;
			case 'xlsx': cb(JSON.parse(e.data.d)); break;
		}
	};
	var arr = rABS ? data : btoa(fixdata(data));
	worker.postMessage({d:arr,b:rABS});
}

function get_radio_value( radioName ) {
	var radios = document.getElementsByName( radioName );
	for( var i = 0; i < radios.length; i++ ) {
		if( radios[i].checked ) {
			return radios[i].value;
		}
	}
}

function to_csv(workbook) {
	var result = [];
	workbook.SheetNames.forEach(function(sheetName) {
		var csv = XLSX.utils.sheet_to_csv(workbook.Sheets[sheetName]);
		if(csv.length > 0){
			result.push("SHEET: " + sheetName);
			result.push("");
                        result = [];
			result.push(csv);
		}
	});
	return result.join("\n").replace(/,+\n/g, '\n').replace(/[\s]+$/, '\n');
}

/* xlsx2socialcalc.js (C) 2014 SheetJS -- http://sheetjs.com */

/* vim: set ts=2: */
var sheet_to_socialcalc = (function() {
        var header = [
                "socialcalc:version:1.5",
                "MIME-Version: 1.0",
                "Content-Type: multipart/mixed; boundary=SocialCalcSpreadsheetControlSave"
        ].join("\n");

        var sep = [
                "--SocialCalcSpreadsheetControlSave",
                "Content-type: text/plain; charset=UTF-8",
                ""
        ].join("\n");

        /* TODO: the other parts */
        var meta = [
                "# SocialCalc Spreadsheet Control Save",
                "part:sheet"
        ].join("\n");

        var end = "--SocialCalcSpreadsheetControlSave--";

        var scencode = function(s) { return s.replace(/\\/g, "\\b").replace(/:/g, "\\c").replace(/\n/g,"\\n"); }

        var scsave = function scsave(ws) {
                if(!ws || !ws['!ref']) return "";
                var o = [], oo = [], cell, coord;
                var r = XLSX.utils.decode_range(ws['!ref']);
                for(var R = r.s.r; R <= r.e.r; ++R) {
                        for(var C = r.s.c; C <= r.e.c; ++C) {
                                coord = XLSX.utils.encode_cell({r:R,c:C});
                                if(!(cell = ws[coord]) || cell.v == null) continue;
                                oo = ["cell", coord, 't'];
                                switch(cell.t) {
                                        case 's': case 'str': oo.push(scencode(cell.v)); break;
                                        case 'n':
                                                if(cell.f) {
                                                        oo[2] = 'vtf';
                                                        oo.push('n');
                                                        oo.push(cell.v);
                                                        oo.push(scencode(cell.f));
                                                }
                                                else {
                                                        oo[2] = 'v';
                                                        oo.push(cell.v);
                                                } break;
                                }
                                o.push(oo.join(":"));
                        }
                }
                o.push("sheet:c:" + (r.e.c - r.s.c + 1) + ":r:" + (r.e.r - r.s.r + 1) + ":tvf:1");
                o.push("valueformat:1:text-wiki");
                o.push("copiedfrom:" + ws['!ref']);
                return o.join("\n");
        };

        return function socialcalcify(ws, opts) {
                return [header, sep, meta, sep, scsave(ws), end].join("\n");
                //return ["version:1.5", scsave(ws)].join("\n");
        };
})();


var tarea = document.getElementById('b64data');
function b64it() {
	var wb = XLSX.read(tarea.value, {type: 'base64'});
	process_wb(wb);
}

function sheetId(link) {
    return link.replace(/^\//, '');
}

function sheetIsEmpty(link, callback) {
    $.ajax({
        url: './_/' + sheetId(link) + '/csv.json',
        dataType: 'json',
        success: function(rows) {
            callback(!rows.length || rows.every(function(row) {
                return row.every(function(cell) { return cell === '' || cell == null; });
            }));
        },
        error: function(xhr) { callback(xhr.status === 404); }
    });
}

function uniqueTitle(title, rows) {
    var used = {};
    rows.forEach(function(row) { used[row.title.toLowerCase()] = true; });
    var candidate = title || 'Sheet';
    var suffix = 2;
    while (used[candidate.toLowerCase()]) candidate = (title || 'Sheet') + ' ' + suffix++;
    return candidate;
}

function allocateLink(folderId, rows) {
    var used = {};
    rows.forEach(function(row) { used[row.link] = true; });
    var idx = 1;
    var link;
    do { link = '/' + folderId + '.' + idx++; } while (used[link]);
    return link;
}

function planImport(context, titles, callback) {
    var rows = context.rows.map(function(row) { return {link: row.link, title: row.title}; });
    var active = rows[context.activeIndex] || rows[0];
    sheetIsEmpty(active.link, function(empty) {
        var targets = [];
        titles.forEach(function(title, idx) {
            if (idx === 0 && empty) {
                targets.push({link: active.link, title: active.title});
            } else {
                var row = {
                    link: allocateLink(context.folderId, rows),
                    title: uniqueTitle(title, rows)
                };
                rows.push(row);
                targets.push(row);
            }
        });
        callback(targets, rows);
    });
}

function saveFolder(context, rows, selectedLink) {
    var csv = '"#url","#title"\n' + rows.map(function(row) {
        return '"' + row.link.replace(/"/g, '""') + '","' + row.title.replace(/"/g, '""') + '"';
    }).join('\n') + '\n';
    $.ajax({
        url: './_/' + context.folderId,
        method: 'PUT',
        contentType: 'text/csv; charset=utf-8',
        processData: false,
        data: csv,
        success: function() {
            var activeIndex = rows.map(function(row) { return row.link; }).indexOf(selectedLink);
            location.href = './=' + context.folderId + '?active=' + Math.max(activeIndex, 0);
        }
    });
}

function process_wb(wb, context) {
	var output = "";
        if (wb.SheetNames.length >= 1) {
            var names = [].concat(wb.SheetNames);
            var res = [];
            for (var i = 0; i < names.length; i++) {
                res.push(names[i].replace(/'/g, "''").replace(/(\W)/g, '\\$1'));
            }
            planImport(context, names, function(targets, rows) {
                var sheetsToIds = {};
                names.forEach(function(name, idx) { sheetsToIds[name] = sheetId(targets[idx].link); });
                var idx = 0;
                var step = function(){
                    if (idx < names.length) {
                    var k = names[idx];
                    var target = targets[idx++];
                    output = sheet_to_socialcalc(wb.Sheets[k]);
                    output = output.replace(
                        RegExp('(\'?)\\b(' + res.join('|') + ')\\1!', 'g'),
                        function(_0, _1, ref){ return "'" + sheetsToIds[ref.replace(/''/g, "'")] + "'!"; }
                    );
                    $.ajax({
                        url: './_/' + sheetId(target.link),
                        method: 'PUT',
                        contentType: 'text/x-socialcalc; charset=utf-8',
                        processData: false,
                        data: output,
                        success: step
                    });
                    } else saveFolder(context, rows, targets[0].link);
                };
                step();
            });
            return;
        }
}

function post_csv(csv, context, filename) {
    var title = filename ? filename.replace(/\.csv$/i, '') : 'Sheet';
    planImport(context, [title], function(targets, rows) {
        $.ajax({
            url: './_/' + sheetId(targets[0].link),
            method: 'PUT',
            contentType: 'text/csv',
            processData: false,
            data: csv,
            success: function() { saveFolder(context, rows, targets[0].link); }
        });
    });
}

var BASE64URICHARS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-_'.split('');
function newId (len, radix) {
    var chars = BASE64URICHARS, newId = [], i=0;
    radix = radix || chars.length;
    len = len || 22;

    for (i = 0; i < len; i++) newId[i] = chars[0 | Math.random()*radix];

    return newId.join('');
  };

var drop = document.body;
function importFiles(files, context) {
        var toggle = function(){
            $(drop).fadeOut('fast', function(){ $(drop).fadeIn('fast', toggle) });
        }
	var i,f;
        $(drop).html('<br><br><center>Working...</center>');
	for (i = 0, f = files[i]; i != files.length; ++i) {
		var reader = new FileReader();
		var name = f.name;
		reader.onload = function(e) {
			var data = e.target.result;
                        if (!/^PK\u0003\u0004/.test(data) && /^[^\n]+,(?:[^\n]+)*\n/.test(data)) {
                            return post_csv(data, context, name);
                        }
			if(useXlsxWorker && typeof Worker !== 'undefined') {
                                xlsxworker(data, function(wb) { process_wb(wb, context); });
			} else {
				var wb;
				if(rABS) {
					wb = XLSX.read(data, {type: 'binary'});
				} else {
				var arr = fixdata(data);
					wb = XLSX.read(btoa(arr), {type: 'base64'});
				}
				process_wb(wb, context);
			}
		};
		if(rABS) reader.readAsBinaryString(f);
		else reader.readAsArrayBuffer(f);
	}
}

window.importFiles = importFiles;

function handleDrop(e) {
	e.stopPropagation();
	e.preventDefault();
	importFiles(e.dataTransfer.files, window.getImportContext());
}

function handleDragover(e) {
	e.stopPropagation();
	e.preventDefault();
	e.dataTransfer.dropEffect = 'copy';
}

if(drop.addEventListener) {
	drop.addEventListener('dragenter', handleDragover, false);
	drop.addEventListener('dragover', handleDragover, false);
	drop.addEventListener('drop', handleDrop, false);
}
</script>
</html>
